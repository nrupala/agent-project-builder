name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-installers:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact: agent-project-builder-linux
            installer: linux
          - os: windows-latest
            artifact: agent-project-builder-windows
            installer: windows
          - os: macos-latest
            artifact: agent-project-builder-macos
            installer: macos

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build standalone package
        run: npm run build

      # Linux: Create AppImage via linuxdeploy
      - name: Build Linux installer
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p dist/AppDir/usr/{bin,lib}
          cp -r src config public package.json dist/AppDir/usr/lib/agent-project-builder/
          cp dist/AppDir/usr/lib/agent-project-builder/src/index.js dist/AppDir/usr/bin/agent-project-builder
          chmod +x dist/AppDir/usr/bin/agent-project-builder
          cat > dist/AppDir/agent-project-builder.desktop << 'EOF'
          [Desktop Entry]
          Name=Agent Project Builder
          Exec=agent-project-builder
          Icon=agent-project-builder
          Type=Application
          Categories=Development;
          EOF
          curl -LO https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir dist/AppDir --output appimage
          mv *.AppImage dist/agent-project-builder-linux.AppImage

      # Windows: Create portable zip + NSIS installer
      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist
          Compress-Archive -Path src, config, public, package.json, package-lock.json, node_modules -DestinationPath dist/agent-project-builder-windows.zip
          echo "Portable package created"

      # macOS: Create DMG via create-dmg
      - name: Build macOS installer
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p dist/Agent\ Project\ Builder.app/Contents/{MacOS,Resources}
          cat > dist/Agent\ Project\ Builder.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Agent Project Builder</string>
            <key>CFBundleExecutable</key><string>agent-project-builder</string>
            <key>CFBundleIdentifier</key><string>com.nrupala.agent-project-builder</string>
            <key>CFBundleVersion</key><string>1.0.0</string>
            <key>CFBundlePackageType</key><string>APPL</string>
          </dict>
          </plist>
          EOF
          cp src/index.js "dist/Agent Project Builder.app/Contents/MacOS/agent-project-builder"
          chmod +x "dist/Agent Project Builder.app/Contents/MacOS/agent-project-builder"
          tar czf dist/agent-project-builder-macos.tar.gz -C dist "Agent Project Builder.app"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  release:
    needs: build-installers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
